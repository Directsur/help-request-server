#
# Preseed para instalación desatendida de Debian 13 con el servidor
# de Solicitudes de Ayuda preinstalado.
#
# Parámetros de arranque requeridos:
#   auto=true priority=critical file=/cdrom/preseed.cfg

# ── Localización ───────────────────────────────────────────────────────────────
d-i debian-installer/locale string es_ES.UTF-8
d-i localechooser/supported-locales multiselect es_ES.UTF-8
d-i keyboard-configuration/xkb-keymap select es
d-i keyboard-configuration/layout select Spanish
d-i keyboard-configuration/variant select Spanish

# ── Red ────────────────────────────────────────────────────────────────────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string servidor-ayuda
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

# ── Espejo de Debian ───────────────────────────────────────────────────────────
d-i mirror/country string ES
d-i mirror/http/mirror string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie

# ── Reloj y zona horaria ───────────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Madrid
d-i clock-setup/ntp boolean true

# ── Particionado ───────────────────────────────────────────────────────────────
# Usa todo el primer disco. Esquema:
#   /boot  512 MB  ext4   (o EFI 512 MB en sistemas UEFI)
#   swap     2 GB
#   /       15 GB  ext4
#   /var   resto   ext4   (logs y base de datos)

d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

d-i partman-auto/choose_recipe select boot-root-var
d-i partman-auto/expert_recipe string               \
    boot-root-var ::                                \
        1 1 1 free                                  \
            $iflabel{ gpt }                         \
            $reusemethod{ }                         \
            method{ efi }                           \
            format{ }                               \
        .                                           \
        512 512 512 ext4                            \
            $primary{ }                             \
            $bootable{ }                            \
            method{ format } format{ }              \
            use_filesystem{ } filesystem{ ext4 }    \
            mountpoint{ /boot }                     \
        .                                           \
        2048 2048 2048 linux-swap                   \
            method{ swap } format{ }                \
        .                                           \
        15360 20000 -1 ext4                         \
            method{ format } format{ }              \
            use_filesystem{ } filesystem{ ext4 }    \
            mountpoint{ / }                         \
        .                                           \
        4096 4096 1000000 ext4                      \
            method{ format } format{ }              \
            use_filesystem{ } filesystem{ ext4 }    \
            mountpoint{ /var }                      \
        .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ── Usuario root ───────────────────────────────────────────────────────────────
# IMPORTANTE: cambie esta contraseña después del primer acceso.
d-i passwd/root-login boolean true
d-i passwd/root-password password Direct2025!
d-i passwd/root-password-again password Direct2025!
d-i passwd/make-user boolean false

# ── Selección de paquetes ──────────────────────────────────────────────────────
tasksel tasksel/first multiselect ssh-server
d-i pkgsel/include string curl git ca-certificates
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# ── GRUB ───────────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ── Post-instalación: instalar el servidor de Solicitudes de Ayuda ─────────────
d-i preseed/late_command string \
    in-target apt-get install -y --no-install-recommends git; \
    in-target git clone https://github.com/Directsur/help-request-server /opt/hr-setup; \
    in-target bash -c 'NONINTERACTIVE=1 ADMIN_PASSWORD=admin bash /opt/hr-setup/install.sh'; \
    in-target rm -rf /opt/hr-setup

# ── Finalizar ─────────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note
