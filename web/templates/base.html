<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sistema de Solicitudes de Ayuda{% endblock %}</title>
  <link href="/static/bootstrap.min.css" rel="stylesheet">
  <link href="/static/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex" style="min-height:100vh">
    <nav class="sidebar bg-dark text-white d-flex flex-column p-3" style="width:240px;min-width:240px">
      <div class="mb-4">
        <span class="fs-6 fw-bold"><i class="bi bi-bell-fill text-warning me-2"></i>Solicitudes de Ayuda</span>
      </div>
      <ul class="nav flex-column gap-1 flex-grow-1">
        <li class="nav-item">
          <a href="/dashboard" class="nav-link text-white {% if request.url.path == '/dashboard' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="/clients" class="nav-link text-white {% if request.url.path == '/clients' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-pc-display me-2"></i>Equipos
          </a>
        </li>
        <li class="nav-item">
          <a href="/groups" class="nav-link text-white {% if request.url.path == '/groups' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-diagram-3 me-2"></i>Grupos
          </a>
        </li>
        <li class="nav-item">
          <a href="/locations" class="nav-link text-white {% if request.url.path == '/locations' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-building me-2"></i>Ubicaciones
          </a>
        </li>
        <li class="nav-item">
          <a href="/alerts" class="nav-link text-white {% if request.url.path == '/alerts' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-exclamation-triangle me-2"></i>Solicitudes
          </a>
        </li>
        <li class="nav-item">
          <a href="/reports" class="nav-link text-white {% if request.url.path == '/reports' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-bar-chart me-2"></i>Informes
          </a>
        </li>
        <li class="nav-item">
          <a href="/settings" class="nav-link text-white {% if request.url.path == '/settings' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-gear me-2"></i>Configuración
          </a>
        </li>
        <li class="nav-item">
          <a href="/help" class="nav-link text-white {% if request.url.path == '/help' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-question-circle me-2"></i>Ayuda
          </a>
        </li>
      </ul>
      <div class="mt-auto pt-3 border-top border-secondary">
        <a href="/logout" class="nav-link text-white-50"><i class="bi bi-box-arrow-left me-2"></i>Cerrar sesión</a>
      </div>
    </nav>
    <main class="flex-grow-1 p-4 bg-light">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
